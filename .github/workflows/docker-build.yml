name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: docker build -t 943210priya/employee-backend:v1 ./backend

      - name: Push backend image
        run: docker push 943210priya/employee-backend:v1

      - name: Build frontend image
        run: docker build -t 943210priya/employee-frontend:v1 ./frontend/temp-react

      - name: Push frontend image
        run: docker push 943210priya/employee-frontend:v1