apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-frontend
  template:
    metadata:
      labels:
        app: employee-frontend
    spec:
      containers:
      - name: frontend
        image: image: 943210priya/employee-frontend:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000