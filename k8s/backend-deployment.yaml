apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-backend
  template:
    metadata:
      labels:
        app: employee-backend
    spec:
      containers:
      - name: backend
        image: 943210priya/employee-backend:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 5000